pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Non-root temp paths (required by HF Spaces)
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    # Performance
    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    # Gzip (text assets only — videos pass through as-is)
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   4;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml text/javascript;

    # Upload / body limits (portal only receives small form data, not raw uploads)
    client_max_body_size 10m;

    # Logging
    access_log off;
    error_log  /tmp/error.log warn;

    server {
        listen 7860;

        # ── Health check — answered directly by Nginx, zero latency ──────────
        location = /health {
            return 200 'healthy';
            add_header Content-Type text/plain;
        }

        # ── Downloader / portal routes → FastAPI (port 8000) ─────────────────
        # Long timeouts needed: a big-file download can take many minutes.
        location ~ ^/(download|view|delete|login|logout|progress|scan|rename) {
            proxy_pass       http://127.0.0.1:8000;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Prevent Nginx from timing out during large file downloads
            proxy_read_timeout  86400s;
            proxy_send_timeout  86400s;
            proxy_connect_timeout 60s;

            # Don't buffer large streaming responses — pass through immediately
            proxy_buffering    off;
            proxy_request_buffering off;
        }

        # ── Element Web Matrix chat client → /chat/ ───────────────────────────
        location /chat/ {
            alias /usr/share/nginx/element/;
            index index.html;
            try_files $uri $uri/ =404;

            # Allow SPA routing
            add_header Cache-Control "no-cache, must-revalidate";
        }

        location = /chat {
            return 301 $scheme://$http_host/chat/;
        }

        # ── Everything else → Jellyfin (port 8097) ────────────────────────────
        location / {
            proxy_pass       http://127.0.0.1:8097;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Protocol $scheme;
            proxy_set_header X-Forwarded-Host  $http_host;

            # WebSocket support (required for Jellyfin streaming)
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";

            # Large-file streaming timeouts
            proxy_read_timeout    3600s;
            proxy_send_timeout    3600s;
            proxy_connect_timeout 60s;

            proxy_buffering off;
        }
    }
}
